<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Booker • 07:00–17:00</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f8fafc; }
        .slot-card { transition: all 0.2s; }
        .slot-card:hover { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .entry { transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen py-8">
    <div class="max-w-2xl mx-auto px-4">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">📅 Dock Booking Slots</h1>
            <button onclick="resetAll()" 
                    class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg flex items-center gap-2">
                <i class="fas fa-undo"></i> Reset All
            </button>
        </div>

        <div id="slots" class="space-y-6"></div>

        <div class="mt-8 text-center text-xs text-slate-400">
            Built exactly to your spec • Max 3 per hour • Fully functional demo • Copy &amp; paste into your index.html
        </div>
    </div>

    <script>
        // Tailwind script already loaded via CDN
        function initTailwind() {
            // no extra needed
        }

        const hours = Array.from({length: 11}, (_, i) => {
            const h = 7 + i;
            return `${h.toString().padStart(2, '0')}:00`;
        });

        let slotsData = hours.map(time => ({
            time: time,
            count: 0,
            max: 3,
            bookings: []
        }));

        function createSlotElement(slot, index) {
            const div = document.createElement('div');
            div.className = `slot-card bg-white border border-slate-200 rounded-2xl p-5 shadow-sm`;
            div.dataset.index = index;

            div.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-clock text-2xl text-indigo-500"></i>
                        <h3 class="text-xl font-semibold text-slate-800">${slot.time}</h3>
                    </div>
                    <span id="count-${index}" class="font-mono text-lg font-bold px-3 py-1 bg-slate-100 rounded-full text-slate-700">
                        (0/3)
                    </span>
                </div>

                <!-- Bookings list -->
                <div id="bookings-${index}" class="space-y-3 min-h-[60px]"></div>

                <!-- Add section -->
                <div id="add-section-${index}" class="mt-4">
                    <button id="add-btn-${index}"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-2 shadow-md">
                        <i class="fas fa-plus"></i> ADD BOOKING
                    </button>

                    <!-- Form (drops down) -->
                    <div id="form-${index}" class="hidden mt-3 border border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="cont-${index}" type="text" placeholder="Container # (e.g. MSCU123456)" 
                                   class="border border-slate-300 focus:border-indigo-500 rounded-lg px-3 py-2 text-sm">
                            <input id="truck-${index}" type="text" placeholder="Truck Company (e.g. Maersk Trucking)" 
                                   class="border border-slate-300 focus:border-indigo-500 rounded-lg px-3 py-2 text-sm">
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button id="save-${index}"
                                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-medium">
                                ✅ SAVE
                            </button>
                            <button id="cancel-${index}"
                                    class="flex-1 bg-slate-300 hover:bg-slate-400 py-2 rounded-lg font-medium">
                                CANCEL
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // Attach listeners
            const addBtn = div.querySelector(`#add-btn-${index}`);
            const form = div.querySelector(`#form-${index}`);
            const bookingsContainer = div.querySelector(`#bookings-${index}`);
            const countEl = div.querySelector(`#count-${index}`);

            function updateUI() {
                countEl.textContent = `(${slot.count}/${slot.max})`;
                const shouldShowAdd = slot.count < slot.max;
                addBtn.style.display = shouldShowAdd ? 'flex' : 'none';
            }

            addBtn.addEventListener('click', () => {
                form.classList.remove('hidden');
                addBtn.style.display = 'none';
                // focus first input
                div.querySelector(`#cont-${index}`).focus();
            });

            div.querySelector(`#save-${index}`).addEventListener('click', () => {
                const containerVal = div.querySelector(`#cont-${index}`).value.trim();
                const truckVal = div.querySelector(`#truck-${index}`).value.trim();

                if (!containerVal || !truckVal) {
                    alert("Please fill both fields");
                    return;
                }

                // Add booking
                slot.bookings.push({
                    container: containerVal,
                    truck: truckVal
                });
                slot.count++;

                // Create nice entry row
                const entry = document.createElement('div');
                entry.className = `entry flex justify-between items-center bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-sm`;
                entry.innerHTML = `
                    <div>
                        <span class="font-mono font-bold text-emerald-600">${containerVal}</span>
                        <span class="mx-2 text-slate-400">•</span>
                        <span class="text-slate-600">${truckVal}</span>
                    </div>
                    <button class="remove-btn text-red-500 hover:text-red-600 font-bold px-2 py-1">✕</button>
                `;

                // Remove handler
                entry.querySelector('.remove-btn').addEventListener('click', () => {
                    const idx = slot.bookings.findIndex(b => b.container === containerVal);
                    if (idx > -1) slot.bookings.splice(idx, 1);
                    slot.count--;
                    bookingsContainer.removeChild(entry);
                    updateUI();
                });

                bookingsContainer.appendChild(entry);

                // Reset form & UI
                div.querySelector(`#cont-${index}`).value = '';
                div.querySelector(`#truck-${index}`).value = '';
                form.classList.add('hidden');
                updateUI();
            });

            div.querySelector(`#cancel-${index}`).addEventListener('click', () => {
                form.classList.add('hidden');
                updateUI(); // restores add button if still room
            });

            // Initial UI state
            updateUI();

            return div;
        }

        function renderAll() {
            const container = document.getElementById('slots');
            container.innerHTML = '';
            
            slotsData.forEach((slot, i) => {
                const el = createSlotElement(slot, i);
                container.appendChild(el);
            });
        }

        function resetAll() {
            if (confirm("Clear everything?")) {
                slotsData = hours.map(time => ({
                    time: time,
                    count: 0,
                    max: 3,
                    bookings: []
                }));
                renderAll();
            }
        }

        // Boot
        window.onload = () => {
            renderAll();

            // Demo: pre-fill one slot so you can see the flow immediately
            setTimeout(() => {
                // Simulate first booking in 09:00 slot (index 2)
                const demoSlot = slotsData[2];
                demoSlot.bookings.push({container: "COSU987654", truck: "Linehaul Ltd"});
                demoSlot.count = 1;
                
                // Force re-render of just that slot (for demo)
                const container = document.getElementById('slots');
                container.children[2].remove();
                const newDemoEl = createSlotElement(demoSlot, 2);
                container.insertBefore(newDemoEl, container.children[2]);
                
                console.log('%c✅ Demo loaded – click any + button to test!', 'color:#10b981; font-weight:bold');
            }, 800);
        };

        // Bonus: keyboard shortcut to reset (Ctrl/Cmd + Shift + R)
        document.addEventListener('keydown', e => {
            if (e.shiftKey && e.key.toLowerCase() === 'r' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                resetAll();
            }
        });
    </script>
</body>
</html>
