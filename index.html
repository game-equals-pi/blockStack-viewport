<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y Block – 3D Viewport</title>
  <style>
    body { margin:0; overflow:hidden; font-family: Arial, sans-serif; background:#000; }
    #three-canvas { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 10; 
    }
    #two-d-page { 
      position: absolute; top: 0; left: 0; z-index: 20; display: none; background: #88aaff; width: 100%; height: 100%; 
    }
    #two-d-canvas { width: 100%; height: 100%; display: block; }
    #settings-button {
      position: absolute; top: 20px; left: 20px; z-index: 110;
      padding: 10px; background: #333; color: white; border: none;
      border-radius: 50%; cursor: pointer; font-size: 20px;
    }
    #settings-menu {
      position: absolute; top: 60px; left: 20px; z-index: 110;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px;
      display: none; color: white;
    }
    #settings-menu button {
      display: block; width: 100%; padding: 10px; margin: 5px 0;
      background: #007bff; color: white; border: none; cursor: pointer;
    }
    #paste-button {
      position: absolute; top: 20px; right: 20px; z-index: 110;
      padding: 12px 24px; background: #007bff; color: white; border: none;
      border-radius: 6px; cursor: pointer; font-size: 16px;
    }
    #paste-button:hover { background: #0056b3; }
    #paste-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95); padding: 25px; border-radius: 10px;
      width: 420px; max-width: 90%; z-index: 120; display: none; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #paste-textarea { width: 100%; height: 220px; margin: 15px 0; font-family: monospace; }
    #submit-paste, #close-modal { padding: 10px 20px; margin: 8px; cursor: pointer; font-size: 14px; }
    #back-button {
      position: absolute; top: 20px; left: 20px; z-index: 130;
      padding: 10px 20px; background: #007bff; color: white; border: none;
      border-radius: 6px; cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="three-canvas"></canvas> <!-- For 3D -->

<div id="two-d-page">
  <canvas id="two-d-canvas"></canvas>
  <button id="back-button">Back to 3D</button>
</div>

<button id="settings-button">⚙</button>
<div id="settings-menu">
  <button id="yard-layout-button">Yard Layout</button>
</div>

<button id="paste-button">Paste Excel Data</button>

<div id="paste-modal">
  <h3>Paste Excel Data (Tab-separated from Excel)</h3>
  <p>Expected columns: Container number, Voyage, Discharge port, Location (e.g. Y 39G 2), Group (20 or 40)</p>
  <textarea id="paste-textarea" placeholder="Paste copied rows here..."></textarea>
  <div>
    <button id="submit-paste">Submit & Place Containers</button>
    <button id="close-modal">Close</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { FontLoader } from 'three/addons/loaders/FontLoader.js';
  import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

  // ─── 3D Scene Setup ────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x88aaff);
  scene.fog = new THREE.FogExp2(0x88aaff, 0.0008);

  const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 4000);
  camera.position.set(120, 60, 120);

  const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('three-canvas') });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);

  function resize3D() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  }
  window.addEventListener('resize', resize3D);
  resize3D();

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.rotateSpeed = 0.8;
  controls.zoomSpeed = 1.2;
  controls.panSpeed = 0.8;
  controls.minDistance = 20;
  controls.maxDistance = 800;
  controls.maxPolarAngle = Math.PI / 2;
  controls.target.set(0, 0, 0);
  controls.update();

  // ─── Ground & Labels ───────────────────────────────────────────
  const oddCols = [];
  for (let n = 9; n <= 39; n += 2) oddCols.push(n);
  const numOddCols = oddCols.length;
  const rows = 7;
  const cellWidth = 30;
  const cellDepth = 10;
  const gridSizeX = numOddCols * cellWidth;
  const gridSizeZ = rows * cellDepth;

  const planeGeo = new THREE.PlaneGeometry(gridSizeX, gridSizeZ);
  const planeMat = new THREE.MeshBasicMaterial({ color: 0x555577, side: THREE.DoubleSide });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.y = -0.01;
  scene.add(plane);

  const loader = new FontLoader();
  loader.load('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/fonts/helvetiker_regular.typeface.json', font => {
    const textMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

    oddCols.forEach((num, index) => {
      const textGeo = new TextGeometry(num.toString(), { font, size: 6, depth: 0.5, curveSegments: 4 });
      const mesh = new THREE.Mesh(textGeo, textMat);
      const cellCenterX = -gridSizeX / 2 + (index + 0.5) * cellWidth;
      mesh.position.set(cellCenterX, 0.2, -gridSizeZ / 2 - 18);
      mesh.rotation.x = -Math.PI / 2;
      scene.add(mesh);
    });

    const letters = 'ABCDEFG'.split('');
    for (let i = 0; i < rows; i++) {
      const textGeo = new TextGeometry(letters[i], { font, size: 8, depth: 0.6, curveSegments: 4 });
      const mesh = new THREE.Mesh(textGeo, textMat);
      const cellCenterZ = -gridSizeZ / 2 + (i + 0.5) * cellDepth;
      mesh.position.set(-gridSizeX / 2 - 30, 0.2, cellCenterZ);
      mesh.rotation.x = -Math.PI / 2;
      scene.add(mesh);
    }

    const titleGeo = new TextGeometry("Y BLOCK", { font, size: 18, depth: 1.8, curveSegments: 6 });
    const title = new THREE.Mesh(titleGeo, new THREE.MeshBasicMaterial({ color: 0xffff88 }));
    title.position.set(0, 30, -gridSizeZ / 2 - 60);
    title.rotation.x = -Math.PI / 2;
    scene.add(title);
  });

  scene.add(new THREE.AmbientLight(0xffffff, 1.2));
  const sun = new THREE.DirectionalLight(0xffffe0, 1.5);
  sun.position.set(200, 400, 150);
  scene.add(sun);

  // ─── 2D Yard Layout ────────────────────────────────────────────
  const twoDPage = document.getElementById('two-d-page');
  const twoDCanvas = document.getElementById('two-d-canvas');
  const twoDCtx = twoDCanvas.getContext('2d');

  function resize2DCanvas() {
    twoDCanvas.width = window.innerWidth;
    twoDCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize2DCanvas);
  resize2DCanvas();

  // Block stack data (array of objects – we'll make these draggable)
  let blockStacks = [
    { id: 1, name: 'Stack A', x: -200, y: -100, width: 120, height: 80, color: 'rgba(255, 100, 100, 0.7)', rotation: 0 },
    { id: 2, name: 'Stack B', x: 100, y: 50, width: 160, height: 60, color: 'rgba(100, 255, 100, 0.7)', rotation: 0 }
  ];

  let selectedBlock = null;
  let isDragging = false;
  let startX, startY;

  function draw2DYard() {
    twoDCtx.clearRect(0, 0, twoDCanvas.width, twoDCanvas.height);
    twoDCtx.fillStyle = '#88aaff';
    twoDCtx.fillRect(0, 0, twoDCanvas.width, twoDCanvas.height);

    const centerX = twoDCanvas.width / 2;
    const centerY = twoDCanvas.height / 2;
    const yardWidth = numOddCols * 40;
    const yardHeight = rows * 40;
    const scale = Math.min(twoDCanvas.width / yardWidth, twoDCanvas.height / yardHeight) * 0.7;

    twoDCtx.save();
    twoDCtx.translate(centerX, centerY);
    twoDCtx.scale(scale, scale);

    // Yard background & grid
    twoDCtx.fillStyle = '#555577';
    twoDCtx.fillRect(-yardWidth/2, -yardHeight/2, yardWidth, yardHeight);

    twoDCtx.strokeStyle = '#aaccff';
    twoDCtx.lineWidth = 1 / scale;
    for (let i = 0; i <= numOddCols; i++) {
      const x = -yardWidth/2 + i * 40;
      twoDCtx.beginPath();
      twoDCtx.moveTo(x, -yardHeight/2);
      twoDCtx.lineTo(x, yardHeight/2);
      twoDCtx.stroke();
    }
    for (let i = 0; i <= rows; i++) {
      const y = -yardHeight/2 + i * 40;
      twoDCtx.beginPath();
      twoDCtx.moveTo(-yardWidth/2, y);
      twoDCtx.lineTo(yardWidth/2, y);
      twoDCtx.stroke();
    }

    // Labels
    twoDCtx.fillStyle = 'white';
    twoDCtx.font = 'bold 16px Arial';
    twoDCtx.textAlign = 'center';
    twoDCtx.textBaseline = 'middle';
    oddCols.forEach((num, idx) => {
      const x = -yardWidth/2 + (idx + 0.5) * 40;
      twoDCtx.fillText(num, x, -yardHeight/2 - 30);
    });

    'ABCDEFG'.split('').forEach((letter, idx) => {
      const y = -yardHeight/2 + (idx + 0.5) * 40;
      twoDCtx.fillText(letter, -yardWidth/2 - 30, y);
    });

    twoDCtx.font = 'bold 32px Arial';
    twoDCtx.fillText('Y BLOCK', 0, -yardHeight/2 - 80);

    // Draw draggable blocks
    blockStacks.forEach(block => {
      twoDCtx.save();
      twoDCtx.translate(block.x + block.width/2, block.y + block.height/2);
      twoDCtx.rotate(block.rotation * Math.PI / 180);
      twoDCtx.translate(-block.width/2, -block.height/2);
      twoDCtx.fillStyle = block.color;
      twoDCtx.fillRect(0, 0, block.width, block.height);
      twoDCtx.strokeStyle = '#000';
      twoDCtx.lineWidth = 2 / scale;
      twoDCtx.strokeRect(0, 0, block.width, block.height);
      twoDCtx.fillStyle = 'white';
      twoDCtx.font = 'bold 14px Arial';
      twoDCtx.textAlign = 'center';
      twoDCtx.fillText(block.name, block.width/2, block.height/2 + 5);
      twoDCtx.restore();
    });

    twoDCtx.restore();
  }

  // Mouse interaction for dragging
  twoDCanvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return; // left click only
    const rect = twoDCanvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) / rect.width * twoDCanvas.width;
    const mouseY = (e.clientY - rect.top) / rect.height * twoDCanvas.height;

    // Convert to scaled yard coordinates
    const centerX = twoDCanvas.width / 2;
    const centerY = twoDCanvas.height / 2;
    const yardWidth = numOddCols * 40;
    const yardHeight = rows * 40;
    const scale = Math.min(twoDCanvas.width / yardWidth, twoDCanvas.height / yardHeight) * 0.7;
    const yardMouseX = (mouseX - centerX) / scale;
    const yardMouseY = (mouseY - centerY) / scale;

    selectedBlock = null;
    for (let i = blockStacks.length - 1; i >= 0; i--) {
      const b = blockStacks[i];
      if (yardMouseX >= b.x && yardMouseX <= b.x + b.width &&
          yardMouseY >= b.y && yardMouseY <= b.y + b.height) {
        selectedBlock = b;
        isDragging = true;
        startX = yardMouseX - b.x;
        startY = yardMouseY - b.y;
        break;
      }
    }
  });

  twoDCanvas.addEventListener('mousemove', e => {
    if (!isDragging || !selectedBlock) return;
    const rect = twoDCanvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) / rect.width * twoDCanvas.width;
    const mouseY = (e.clientY - rect.top) / rect.height * twoDCanvas.height;

    const centerX = twoDCanvas.width / 2;
    const centerY = twoDCanvas.height / 2;
    const yardWidth = numOddCols * 40;
    const yardHeight = rows * 40;
    const scale = Math.min(twoDCanvas.width / yardWidth, twoDCanvas.height / yardHeight) * 0.7;
    const yardMouseX = (mouseX - centerX) / scale;
    const yardMouseY = (mouseY - centerY) / scale;

    selectedBlock.x = yardMouseX - startX;
    selectedBlock.y = yardMouseY - startY;
    draw2DYard();
  });

  twoDCanvas.addEventListener('mouseup', () => {
    isDragging = false;
    selectedBlock = null;
  });

  twoDCanvas.addEventListener('mouseleave', () => {
    isDragging = false;
  });

  // Right-click menu
  twoDCanvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    const rect = twoDCanvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) / rect.width * twoDCanvas.width;
    const mouseY = (e.clientY - rect.top) / rect.height * twoDCanvas.height;

    const centerX = twoDCanvas.width / 2;
    const centerY = twoDCanvas.height / 2;
    const yardWidth = numOddCols * 40;
    const yardHeight = rows * 40;
    const scale = Math.min(twoDCanvas.width / yardWidth, twoDCanvas.height / yardHeight) * 0.7;
    const yardMouseX = (mouseX - centerX) / scale;
    const yardMouseY = (mouseY - centerY) / scale;

    let clickedBlock = null;
    for (let i = blockStacks.length - 1; i >= 0; i--) {
      const b = blockStacks[i];
      if (yardMouseX >= b.x && yardMouseX <= b.x + b.width &&
          yardMouseY >= b.y && yardMouseY <= b.y + b.height) {
        clickedBlock = b;
        break;
      }
    }

    if (clickedBlock) {
      if (confirm(`Delete "${clickedBlock.name}"?`)) {
        blockStacks = blockStacks.filter(b => b !== clickedBlock);
        draw2DYard();
      } else if (confirm(`Rotate "${clickedBlock.name}" 90°?`)) {
        const temp = clickedBlock.width;
        clickedBlock.width = clickedBlock.height;
        clickedBlock.height = temp;
        clickedBlock.rotation = (clickedBlock.rotation + 90) % 360;
        draw2DYard();
      }
    }
  });

  // Draw when switching to 2D page
  document.getElementById('yard-layout-button').addEventListener('click', () => {
    twoDPage.style.display = 'block';
    draw2DYard();
    settingsMenu.style.display = 'none';
  });

  document.getElementById('back-button').addEventListener('click', () => {
    twoDPage.style.display = 'none';
  });

  // ─── Settings menu toggle ──────────────────────────────────────
  const settingsButton = document.getElementById('settings-button');
  const settingsMenu = document.getElementById('settings-menu');
  const yardLayoutButton = document.getElementById('yard-layout-button');

  settingsButton.addEventListener('click', () => {
    settingsMenu.style.display = settingsMenu.style.display === 'block' ? 'none' : 'block';
  });

  document.addEventListener('click', (e) => {
    if (!settingsButton.contains(e.target) && !settingsMenu.contains(e.target)) {
      settingsMenu.style.display = 'none';
    }
  });

  // ─── Animate ───────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
