<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2D Tiled Map – Pan & Zoom</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="ui">Scroll to zoom · Right-click + drag to pan</div>
<canvas id="c"></canvas>

<script>
// ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let width, height;

// Viewport / camera
let camera = {
  x: 0,
  y: 0,
  zoom: 1.0,
  zoomMin: 0.4,
  zoomMax: 8.0
};

// Mouse state
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

// World settings
const TILE_SIZE = 64;           // pixels per tile at zoom=1
const MAP_WIDTH_TILES  = 80;    // how wide is the world
const MAP_HEIGHT_TILES = 60;

// ────────────────────────────────────────────────
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

// ────────────────────────────────────────────────
function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + width/2,
    y: (wy - camera.y) * camera.zoom + height/2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - width/2) / camera.zoom + camera.x,
    y: (sy - height/2) / camera.zoom + camera.y
  };
}

// ────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0a1f0a';
  ctx.fillRect(0, 0, width, height);

  // Grid
  ctx.strokeStyle = 'rgba(100,180,100,0.25)';
  ctx.lineWidth = 1;

  const left   = screenToWorld(0, 0).x;
  const right  = screenToWorld(width, 0).x;
  const top    = screenToWorld(0, 0).y;
  const bottom = screenToWorld(0, height).y;

  const startX = Math.floor(left / TILE_SIZE) * TILE_SIZE;
  const startY = Math.floor(top  / TILE_SIZE) * TILE_SIZE;

  for (let wx = startX; wx < right + TILE_SIZE; wx += TILE_SIZE) {
    for (let wy = startY; wy < bottom + TILE_SIZE; wy += TILE_SIZE) {
      const tx = Math.floor(wx / TILE_SIZE);
      const ty = Math.floor(wy / TILE_SIZE);

      // Simple procedural coloring
      let color;
      if (tx < 0 || ty < 0 || tx >= MAP_WIDTH_TILES || ty >= MAP_HEIGHT_TILES) {
        color = '#1a2a1a'; // out of bounds
      } else {
        const hash = (tx * 374761393 + ty * 668265263) | 0;
        const r = 90 + (hash % 40);
        const g = 140 + ((hash >> 8) % 50);
        const b = 80 + ((hash >> 16) % 40);
        color = `rgb(${r},${g},${b})`;
      }

      const s = worldToScreen(wx, wy);
      ctx.fillStyle = color;
      ctx.fillRect(s.x, s.y, TILE_SIZE * camera.zoom + 1, TILE_SIZE * camera.zoom + 1);

      // optional grid lines
      ctx.strokeRect(s.x, s.y, TILE_SIZE * camera.zoom, TILE_SIZE * camera.zoom);
    }
  }

  // Optional: draw origin cross
  const o = worldToScreen(0, 0);
  ctx.strokeStyle = 'rgba(255,80,80,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(o.x - 20, o.y);
  ctx.lineTo(o.x + 20, o.y);
  ctx.moveTo(o.x, o.y - 20);
  ctx.lineTo(o.x, o.y + 20);
  ctx.stroke();
}

// ────────────────────────────────────────────────
canvas.addEventListener('wheel', e => {
  e.preventDefault();

  const before = screenToWorld(e.offsetX, e.offsetY);

  // zoom
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  camera.zoom = Math.max(camera.zoomMin, Math.min(camera.zoomMax, camera.zoom * factor));

  const after = screenToWorld(e.offsetX, e.offsetY);

  // keep cursor point fixed
  camera.x += before.x - after.x;
  camera.y += before.y - after.y;

  draw();
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) {           // right click
    isDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;

  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;

  camera.x -= dx / camera.zoom;
  camera.y -= dy / camera.zoom;

  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;

  draw();
});

window.addEventListener('mouseup', e => {
  if (e.button === 2) {
    isDragging = false;
    canvas.style.cursor = 'default';
  }
});

window.addEventListener('contextmenu', e => {
  e.preventDefault(); // stop right-click menu
});

// ────────────────────────────────────────────────
draw(); // first draw

</script>
</body>
</html>
