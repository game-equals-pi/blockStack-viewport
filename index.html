<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empty Tiled Grid – Pan & Zoom</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a140a;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #88ff88;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
      user-select: none;
      pointer-events: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="ui">Scroll to zoom · Right-click drag to pan</div>
<canvas id="c"></canvas>

<script>
// ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let width, height;

// Camera / view
let camera = {
  x: 0,
  y: 0,
  zoom: 1.0,
  zoomMin: 0.3,
  zoomMax: 12.0
};

// Mouse
let isDragging = false;
let lastMouse = { x: 0, y: 0 };

// World grid settings
const TILE_SIZE = 64;
const MAP_WIDTH_TILES  = 80;
const MAP_HEIGHT_TILES = 60;

// ────────────────────────────────────────────────
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

// ────────────────────────────────────────────────
function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + width  / 2,
    y: (wy - camera.y) * camera.zoom + height / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - width / 2)  / camera.zoom + camera.x,
    y: (sy - height / 2) / camera.zoom + camera.y
  };
}

// ────────────────────────────────────────────────
function draw() {
  // Dark background
  ctx.fillStyle = '#0a140a';
  ctx.fillRect(0, 0, width, height);

  ctx.strokeStyle = 'rgba(80, 140, 80, 0.4)';   // subtle green grid
  ctx.lineWidth = 1;

  // Visible world bounds in screen space
  const left   = screenToWorld(0, 0).x;
  const right  = screenToWorld(width, 0).x;
  const top    = screenToWorld(0, 0).y;
  const bottom = screenToWorld(0, height).y;

  // Start from the tile-aligned position before the top-left
  const startX = Math.floor(left / TILE_SIZE) * TILE_SIZE;
  const startY = Math.floor(top  / TILE_SIZE) * TILE_SIZE;

  for (let wx = startX; wx <= right + TILE_SIZE; wx += TILE_SIZE) {
    for (let wy = startY; wy <= bottom + TILE_SIZE; wy += TILE_SIZE) {
      const tx = Math.floor(wx / TILE_SIZE);
      const ty = Math.floor(wy / TILE_SIZE);

      const s = worldToScreen(wx, wy);
      const tileSizeZoomed = TILE_SIZE * camera.zoom;

      // Only draw grid if inside map bounds (optional — remove condition to show infinite grid)
      if (tx >= 0 && ty >= 0 && tx < MAP_WIDTH_TILES && ty < MAP_HEIGHT_TILES) {
        ctx.strokeRect(s.x, s.y, tileSizeZoomed, tileSizeZoomed);
      }
    }
  }

  // Origin crosshair
  const o = worldToScreen(0, 0);
  ctx.strokeStyle = 'rgba(255, 60, 60, 0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(o.x - 24, o.y);
  ctx.lineTo(o.x + 24, o.y);
  ctx.moveTo(o.x, o.y - 24);
  ctx.lineTo(o.x, o.y + 24);
  ctx.stroke();
}

// ────────────────────────────────────────────────
canvas.addEventListener('wheel', e => {
  e.preventDefault();

  const before = screenToWorld(e.offsetX, e.offsetY);

  const factor = e.deltaY < 0 ? 1.14 : 1 / 1.14;
  camera.zoom = Math.max(camera.zoomMin, Math.min(camera.zoomMax, camera.zoom * factor));

  const after = screenToWorld(e.offsetX, e.offsetY);

  camera.x += before.x - after.x;
  camera.y += before.y - after.y;

  draw();
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) {
    isDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;

  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;

  camera.x -= dx / camera.zoom;
  camera.y -= dy / camera.zoom;

  lastMouse.x = e.clientX;
  lastMouse.y = e.clientY;

  draw();
});

window.addEventListener('mouseup', e => {
  if (e.button === 2) {
    isDragging = false;
    canvas.style.cursor = 'default';
  }
});

window.addEventListener('contextmenu', e => e.preventDefault());

// Initial draw
draw();

</script>
</body>
</html>
