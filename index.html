<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y Block – 3D Viewport</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial,sans-serif; background:#000; }
#three-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; }
#two-d-page { position:absolute; top:0; left:0; width:100%; height:100%; display:none; background:#88aaff; z-index:20; }
#two-d-canvas { width:100%; height:100%; display:block; }
button { cursor:pointer; }

#settings-button { position:absolute; top:20px; left:20px; z-index:130; padding:10px; background:#333; color:white; border:none; border-radius:50%; font-size:20px; }
#settings-menu { position:absolute; top:60px; left:20px; z-index:130; background:rgba(0,0,0,0.85); padding:15px; border-radius:8px; display:none; color:white; }
#settings-menu button { width:100%; padding:10px; margin:5px 0; background:#007bff; color:white; border:none; }

#paste-button { position:absolute; top:20px; right:20px; z-index:130; padding:12px 24px; background:#007bff; color:white; border:none; border-radius:6px; }
#save-layout-button { position:absolute; top:20px; right:150px; z-index:130; padding:12px 24px; background:#ffc107; border:none; border-radius:6px; font-weight:bold; }
#back-button { position:absolute; top:20px; left:20px; z-index:130; padding:10px 20px; background:#007bff; color:white; border:none; border-radius:6px; }
#add-block-button { position:absolute; top:70px; left:20px; z-index:130; padding:10px 20px; background:#28a745; color:white; border:none; border-radius:6px; }

#paste-modal {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.97);
  padding:25px;
  border-radius:10px;
  width:420px;
  max-width:90%;
  z-index:200;
  display:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
#paste-textarea { width:100%; height:200px; font-family:monospace; margin:10px 0; }
</style>
</head>

<body>

<canvas id="three-canvas"></canvas>

<div id="two-d-page">
  <canvas id="two-d-canvas"></canvas>
  <button id="back-button">Back to 3D</button>
  <button id="add-block-button">Add New Block</button>
  <button id="save-layout-button">Save Layout to 3D</button>
</div>

<button id="settings-button">⚙</button>
<div id="settings-menu">
  <button id="yard-layout-button">Yard Layout</button>
</div>

<button id="paste-button">Paste Excel Data</button>

<div id="paste-modal">
  <h3>Paste Excel Data</h3>
  <textarea id="paste-textarea"></textarea>
  <button id="submit-paste">Submit</button>
  <button id="close-modal">Close</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const SCALE_2D = 20;
const CELL_WIDTH_3D = 30;
const CELL_DEPTH_3D = 10;

// ─── 3D SCENE ───────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x88aaff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 4000);
camera.position.set(120,60,120);

const renderer = new THREE.WebGLRenderer({antialias:true, canvas:document.getElementById('three-canvas')});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);

window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

// ─── DATA ───────────────────────────────
let yardBlocks = [
  { id:1, name:'Y', x:0, y:0, columns:16, rows:7, color:'rgba(100,150,255,0.5)', rotation:0 }
];

// ─── 2D SETUP ───────────────────────────────
const twoDPage = document.getElementById('two-d-page');
const canvas = document.getElementById('two-d-canvas');
const ctx = canvas.getContext('2d');

function resize2D(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize2D);
resize2D();

let camera2D = { x:0, y:0, zoom:1 };
let selectedBlock=null;
let isDragging=false;
let dragOffsetX=0, dragOffsetY=0;

// ─── DRAW 2D ───────────────────────────────
function draw2D(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#88aaff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(canvas.width/2 + camera2D.x, canvas.height/2 + camera2D.y);
  ctx.scale(camera2D.zoom, camera2D.zoom);

  yardBlocks.forEach(block=>{
    ctx.save();
    ctx.translate(block.x, block.y);
    ctx.rotate(block.rotation*Math.PI/180);

    const w = block.columns*SCALE_2D;
    const h = block.rows*SCALE_2D;

    ctx.fillStyle=block.color;
    ctx.fillRect(-w/2,-h/2,w,h);

    ctx.strokeStyle="#000";
    ctx.lineWidth=2;
    ctx.strokeRect(-w/2,-h/2,w,h);

    ctx.restore();
  });

  ctx.restore();
}
draw2D();

// ─── WORLD MOUSE HELPER ───────────────────────────────
function screenToWorld(e){
  const rect = canvas.getBoundingClientRect();
  let mx = (e.clientX-rect.left)-canvas.width/2;
  let my = (e.clientY-rect.top)-canvas.height/2;
  mx = (mx-camera2D.x)/camera2D.zoom;
  my = (my-camera2D.y)/camera2D.zoom;
  return {mx,my};
}

// ─── DRAGGING ───────────────────────────────
canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const {mx,my} = screenToWorld(e);

  for(let i=yardBlocks.length-1;i>=0;i--){
    const b = yardBlocks[i];
    const halfW = b.columns*SCALE_2D/2;
    const halfH = b.rows*SCALE_2D/2;

    if(mx>=b.x-halfW && mx<=b.x+halfW &&
       my>=b.y-halfH && my<=b.y+halfH){
        selectedBlock=b;
        isDragging=true;
        dragOffsetX=mx-b.x;
        dragOffsetY=my-b.y;
        break;
    }
  }
});

canvas.addEventListener('mousemove',e=>{
  if(!isDragging||!selectedBlock) return;
  const {mx,my} = screenToWorld(e);
  selectedBlock.x = mx-dragOffsetX;
  selectedBlock.y = my-dragOffsetY;
  draw2D();
});

canvas.addEventListener('mouseup',()=>{
  isDragging=false;
  selectedBlock=null;
});

// ─── RIGHT CLICK ───────────────────────────────
canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const {mx,my} = screenToWorld(e);

  for(let b of yardBlocks){
    const halfW = b.columns*SCALE_2D/2;
    const halfH = b.rows*SCALE_2D/2;
    if(mx>=b.x-halfW && mx<=b.x+halfW &&
       my>=b.y-halfH && my<=b.y+halfH){

      const action = prompt("1=Delete\n2=Rotate 90°");
      if(action==="1"){
        yardBlocks = yardBlocks.filter(x=>x!==b);
      }
      if(action==="2"){
        [b.columns,b.rows]=[b.rows,b.columns];
        b.rotation=(b.rotation+90)%360;
      }
      draw2D();
      break;
    }
  }
});

// ─── ADD BLOCK ───────────────────────────────
document.getElementById('add-block-button').addEventListener('click',()=>{
  yardBlocks.push({
    id:Date.now(),
    name:'New',
    x:0,y:0,
    columns:16,
    rows:7,
    color:'rgba(255,100,100,0.5)',
    rotation:0
  });
  draw2D();
});

// ─── SAVE TO 3D ───────────────────────────────
document.getElementById('save-layout-button').addEventListener('click',()=>{
  scene.clear();
  yardBlocks.forEach(b=>{
    const geo = new THREE.PlaneGeometry(b.columns*CELL_WIDTH_3D, b.rows*CELL_DEPTH_3D);
    const mat = new THREE.MeshBasicMaterial({color:0x555577, side:THREE.DoubleSide});
    const plane = new THREE.Mesh(geo,mat);
    plane.rotation.x=-Math.PI/2;
    plane.position.set(b.x*(CELL_WIDTH_3D/SCALE_2D),0,b.y*(CELL_DEPTH_3D/SCALE_2D));
    scene.add(plane);
  });
});

// ─── UI NAVIGATION ───────────────────────────────
document.getElementById('yard-layout-button').addEventListener('click',()=>{
  twoDPage.style.display='block';
  draw2D();
});
document.getElementById('back-button').addEventListener('click',()=>{
  twoDPage.style.display='none';
});
document.getElementById('settings-button').addEventListener('click',()=>{
  const menu=document.getElementById('settings-menu');
  menu.style.display=menu.style.display==='block'?'none':'block';
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#settings-button') && !e.target.closest('#settings-menu')){
    document.getElementById('settings-menu').style.display='none';
  }
});

// ─── PASTE MODAL ───────────────────────────────
document.getElementById('paste-button').addEventListener('click',()=>{
  document.getElementById('paste-modal').style.display='block';
});
document.getElementById('close-modal').addEventListener('click',()=>{
  document.getElementById('paste-modal').style.display='none';
});
document.getElementById('submit-paste').addEventListener('click',()=>{
  console.log("Paste parsing preserved for expansion.");
  document.getElementById('paste-modal').style.display='none';
});

</script>
</body>
</html>
